<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTINEL — Heatmap</title>
  <link rel="stylesheet" href="../static/css/sentinel.css" />
</head>
<body>

  <div class="app-shell">
    
    <!-- SIDEBAR NAVIGATION -->
    <aside class="sidebar">
      <div class="sidebar__brand">🛡️ SENTINEL</div>
      <nav class="sidebar__nav">
        <a class="sidebar__link" href="/index.html">📊 Dashboard</a>
        <a class="sidebar__link is-active" href="/heatmap.html">🗺️ Heatmap</a>
        <a class="sidebar__link" href="/replay.html">⏮️ Replay</a>
        <a class="sidebar__link" href="/permits.html">📋 Permits</a>
        <a class="sidebar__link" href="/workers.html">👷 Workers</a>
        <a class="sidebar__link" href="/copilot.html">💬 Copilot</a>
        <a class="sidebar__link" href="/report.html">📄 Reports</a>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="mono" style="display:flex; justify-content:space-between; color:var(--text-secondary);">
        <span>SENTINEL — Heatmap</span>
        <span id="heatmapStatus" class="color-normal">Live Tracking</span>
      </div>

      <div class="grid-2">
        <!-- Floorplan Map -->
        <div class="ascii-box" style="height: 500px; display:flex; flex-direction:column;">
          <div style="margin-bottom: 16px; border-bottom:1px solid var(--border); padding-bottom:8px;">PLANT FLOORPLAN</div>
          <div id="heatmapFloorplan" class="loading-overlay" style="flex:1; position:relative; overflow:hidden;">
            <div class="spinner"></div>
          </div>
        </div>

        <!-- Disaster DNA Panel -->
        <div class="ascii-box" style="height: 500px; display:flex; flex-direction:column;">
          <div style="margin-bottom: 16px; border-bottom:1px solid var(--border); padding-bottom:8px;">DISASTER DNA</div>
          <div id="disasterDna" style="flex:1; overflow-y:auto;">
            <div class="loading-overlay" style="height:100%;">Select a zone to view Disaster DNA.</div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="../static/js/data.js"></script>
  <script src="../static/js/heatmap.js"></script>
</body>
</html>
