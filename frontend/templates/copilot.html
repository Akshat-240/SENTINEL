<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
  <meta charset="UTF-8" />
  <script>
  (function () {
    try {
      var theme = localStorage.getItem('sentinel_theme');
      if (theme === 'day' || theme === 'night') {
        document.documentElement.setAttribute('data-theme', theme);
      }
    } catch (e) { /* localStorage unavailable — falls back to default data-theme="day" already in the HTML */ }
  })();
</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTINEL — Copilot</title>
  <link rel="stylesheet" href="../static/css/sentinel.css" />
  <link rel="stylesheet" href="../static/css/copilot.css" />
</head>
<body>

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="topbar__logo">
      <span class="topbar__logo-mark"></span>
      SENTINEL
    </div>

    <nav class="topbar__nav">
      <a class="topbar__link" href="index.html">Dashboard</a>
      <a class="topbar__link" href="heatmap.html">Heatmap</a>
      <a class="topbar__link" href="workers.html">Workers</a>
      <a class="topbar__link" href="permits.html">Permits</a>
      <a class="topbar__link" href="replay.html">Replay</a>
      <a class="topbar__link" href="report.html">Report</a>
      <a class="topbar__link is-active" href="copilot.html">AI Assistant</a>
    </nav>

    <div class="topbar__right">
      <button class="theme-toggle">Night mode</button>
      <span class="topbar__clock mono">00:00:00</span>
    </div>
  </header>

  <!-- ============ COPILOT PAGE ============ -->
  <!-- No floating ai_assistant fab here — you're already on the full page.
       Conversation state is shared with the widget (see copilot.js) so
       history carries over regardless of which one the user opened. -->
  <div class="copilot-shell">

    <div class="copilot-panel card">

      <!-- Header -->
      <div class="copilot-panel__header">
        <div>
          <h1 class="copilot-panel__title">AI Assistant</h1>
          <div class="copilot-panel__subtitle">Ask about zone status, permits, or recommended actions.</div>
        </div>
      </div>

      <!-- Search (simple text-match against message history) -->
      <div class="copilot-panel__search-row">
        <input
          class="copilot-panel__search-input"
          type="text"
          id="copilotSearchInput"
          placeholder="Search conversation..."
        />
      </div>

      <!-- Message history -->
      <div class="copilot-panel__messages" id="copilotMessages"></div>

      <!-- Input -->
      <div class="copilot-panel__input-row">
        <input
          class="copilot-panel__input"
          type="text"
          id="copilotInput"
          placeholder="Ask SENTINEL..."
        />
        <button class="copilot-panel__send" id="copilotSendBtn">Send</button>
      </div>

    </div>

  </div>

  <script src="../static/js/data.js"></script>
  <script src="../static/js/common.js"></script>
  <script src="../static/js/copilot.js"></script>
</body>
</html>
