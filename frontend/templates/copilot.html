<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTINEL — Copilot</title>
  <link rel="stylesheet" href="../static/css/sentinel.css" />
</head>
<body>

  <div class="app-shell">
    
    <aside class="sidebar">
      <div class="sidebar__brand">🛡️ SENTINEL</div>
      <nav class="sidebar__nav">
        <a class="sidebar__link" href="/index.html">📊 Dashboard</a>
        <a class="sidebar__link" href="/heatmap.html">🗺️ Heatmap</a>
        <a class="sidebar__link" href="/replay.html">⏮️ Replay</a>
        <a class="sidebar__link" href="/permits.html">📋 Permits</a>
        <a class="sidebar__link" href="/workers.html">👷 Workers</a>
        <a class="sidebar__link is-active" href="/copilot.html">💬 Copilot</a>
        <a class="sidebar__link" href="/report.html">📄 Reports</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="mono" style="display:flex; justify-content:space-between; color:var(--text-secondary);">
        <span>SENTINEL — RAG Assistant</span>
        <span class="color-normal">Online</span>
      </div>

      <div class="ascii-box" style="flex:1; display:flex; flex-direction:column;">
        <div style="margin-bottom: 16px; border-bottom:1px solid var(--border); padding-bottom:8px;">TERMINAL INTERFACE</div>
        
        <div id="chatWindow" style="flex:1; overflow-y:auto; font-family:var(--font-mono); font-size:14px; margin-bottom:16px;">
          <div style="color:var(--text-secondary); margin-bottom:12px;">> SYSTEM: RAG Pipeline initialized. How can I help you analyze the plant data?</div>
        </div>

        <div style="display:flex; gap:12px; border-top:1px dashed var(--border); padding-top:16px;">
          <input type="text" id="chatInput" placeholder="Ask about safety protocols or current risks..." style="flex:1; background:var(--bg-sunken); border:1px solid var(--border); color:var(--text); padding:8px 12px; font-family:var(--font-mono);" />
          <button id="chatBtn">SEND</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../static/js/copilot.js"></script>
</body>
</html>
