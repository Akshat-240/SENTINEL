<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
  <meta charset="UTF-8" />
  <script>
  (function () {
    try {
      var theme = localStorage.getItem('sentinel_theme');
      if (theme === 'day' || theme === 'night') {
        document.documentElement.setAttribute('data-theme', theme);
      }
    } catch (e) { /* localStorage unavailable — falls back to default data-theme="day" already in the HTML */ }
  })();
</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTINEL — Dashboard</title>
  <link rel="stylesheet" href="../static/css/sentinel.css" />
</head>
<body>

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="topbar__logo">
      <span class="topbar__logo-mark"></span>
      SENTINEL
    </div>

    <nav class="topbar__nav">
      <a class="topbar__link is-active" href="index.html">Dashboard</a>
      <a class="topbar__link" href="heatmap.html">Heatmap</a>
      <a class="topbar__link" href="workers.html">Workers</a>
      <a class="topbar__link" href="permits.html">Permits</a>
      <a class="topbar__link" href="replay.html">Replay</a>
      <a class="topbar__link" href="report.html">Report</a>
    </nav>

    <div class="topbar__right">
      <button class="theme-toggle">Night mode</button>
      <span class="topbar__clock mono">00:00:00</span>
      <span class="pill" style="--pill-bg: var(--risk-high-tint); --pill-fg: var(--risk-high);">
        <span class="pill__dot"></span>
        Zone B · High Risk
      </span>
    </div>
  </header>

  <!-- ============ MAIN LAYOUT ============ -->
  <div class="app-shell">

    <!-- LEFT COLUMN — Worker Exposure -->
    <aside class="worker-column">
      <div class="card worker-panel">
        <div class="worker-panel__header">
          <span class="worker-panel__title">Worker Exposure</span>
          <span class="worker-panel__subtitle">Showing workers in caution zones and above</span>
        </div>
        <div id="workerList"></div>
      </div>
    </aside>

    <!-- MIDDLE COLUMN — Alert Panel / Temperature Trend / Gas Trend -->
    <main class="main-column">

      <section>
        <span class="column-label">Zone Status</span>
        <div class="alert-grid" id="alertGrid"></div>
      </section>

      <section class="card trend-panel">
        <div class="trend-panel__header">
          <span class="trend-panel__title">Temperature Trend</span>
          <div class="trend-panel__zones">
            <button class="temp-panel__zone-btn is-active" data-zone="A">A</button>
            <button class="temp-panel__zone-btn" data-zone="B">B</button>
            <button class="temp-panel__zone-btn" data-zone="C">C</button>
            <button class="temp-panel__zone-btn" data-zone="D">D</button>
          </div>
        </div>
        <div class="trend-panel__chart" id="tempTrendChart"></div>
        <div class="temp-panel__keypoints" id="tempTrendKeypoints"></div>
      </section>

      <section class="card trend-panel">
        <div class="trend-panel__header">
          <span class="trend-panel__title">Gas Trend</span>
          <div class="trend-panel__zones">
            <button class="trend-panel__zone-btn" data-zone="A">A</button>
            <button class="trend-panel__zone-btn is-active" data-zone="B">B</button>
            <button class="trend-panel__zone-btn" data-zone="C">C</button>
            <button class="trend-panel__zone-btn" data-zone="D">D</button>
          </div>
        </div>
        <div class="trend-panel__chart" id="trendChart"></div>
        <div class="trend-panel__keypoints" id="trendKeypoints"></div>
      </section>

    </main>
  </div>

  <!-- ============ FLOATING ai_assistant ============ -->
  <div class="ai_assistant-fab">
    <div class="ai_assistant-fab__panel">
      <div class="ai_assistant-fab__header">
        <span class="ai_assistant-fab__title">AI Assistant</span>
        <a class="ai_assistant-fab__expand" href="ai_assistant.html">Expand ↗</a>
      </div>
      <div class="ai_assistant-fab__messages">
        Ask about zone status, permits, or recommended actions.
      </div>
      <div class="ai_assistant-fab__input-row">
        <input class="ai_assistant-fab__input" type="text" placeholder="Ask SENTINEL..." />
      </div>
    </div>
    <button class="ai_assistant-fab__button">SC</button>
  </div>

  <script src="../static/js/common.js"></script>
  <script src="../static/js/alerts.js"></script>
  <script src="../static/js/temps.js"></script>
  <script src="../static/js/trends.js"></script>
  <script src="../static/js/workers.js"></script>
</body>
</html>
