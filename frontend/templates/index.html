<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTINEL — Dashboard</title>
  <link rel="stylesheet" href="../static/css/sentinel.css" />
</head>
<body>

  <div class="app-shell">
    
    <!-- SIDEBAR NAVIGATION -->
    <aside class="sidebar">
      <div class="sidebar__brand">🛡️ SENTINEL</div>
      <nav class="sidebar__nav">
        <a class="sidebar__link is-active" href="/index.html">📊 Dashboard</a>
        <a class="sidebar__link" href="/heatmap.html">🗺️ Heatmap</a>
        <a class="sidebar__link" href="/replay.html">⏮️ Replay</a>
        <a class="sidebar__link" href="/permits.html">📋 Permits</a>
        <a class="sidebar__link" href="/workers.html">👷 Workers</a>
        <a class="sidebar__link" href="/copilot.html">💬 Copilot</a>
        <a class="sidebar__link" href="/report.html">📄 Reports</a>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="mono" style="display:flex; justify-content:space-between; color:var(--text-secondary);">
        <span>SENTINEL — Zero Harm</span>
        <span class="color-normal">🟢 System Online</span>
      </div>

      <div class="ascii-box">
        <div style="display:flex; justify-content:space-between; margin-bottom: 16px; border-bottom:1px solid var(--border); padding-bottom:8px;">
          <span>PLANT OVERVIEW</span>
          <span id="lastUpdated">Last updated: checking...</span>
        </div>
        
        <div id="plantOverview" class="loading-overlay">
          <div class="spinner"></div> Loading plant status...
        </div>
      </div>

      <div class="grid-2">
        <div class="ascii-box">
          <div style="margin-bottom: 16px; border-bottom:1px solid var(--border); padding-bottom:8px;">ACTIVE ALERTS</div>
          <div id="activeAlerts" class="loading-overlay"><div class="spinner"></div></div>
        </div>

        <div class="ascii-box">
          <div style="margin-bottom: 16px; border-bottom:1px solid var(--border); padding-bottom:8px;">COMPOUND RISKS</div>
          <div id="compoundRisks" class="loading-overlay"><div class="spinner"></div></div>
        </div>
      </div>

    </main>
  </div>

  <script src="../static/js/data.js"></script>
  <script src="../static/js/alerts.js"></script>
</body>
</html>
