<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTINEL — Report</title>
  <link rel="stylesheet" href="../static/css/sentinel.css" />
</head>
<body>

  <div class="app-shell">
    
    <aside class="sidebar">
      <div class="sidebar__brand">🛡️ SENTINEL</div>
      <nav class="sidebar__nav">
        <a class="sidebar__link" href="/index.html">📊 Dashboard</a>
        <a class="sidebar__link" href="/heatmap.html">🗺️ Heatmap</a>
        <a class="sidebar__link" href="/replay.html">⏮️ Replay</a>
        <a class="sidebar__link" href="/permits.html">📋 Permits</a>
        <a class="sidebar__link" href="/workers.html">👷 Workers</a>
        <a class="sidebar__link" href="/copilot.html">💬 Copilot</a>
        <a class="sidebar__link is-active" href="/report.html">📄 Reports</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="mono" style="display:flex; justify-content:space-between; color:var(--text-secondary);">
        <span>SENTINEL — Incident Report Generator</span>
        <span class="color-normal">Ready</span>
      </div>

      <div class="grid-2" style="flex:1;">
        <!-- Generator Controls -->
        <div class="ascii-box">
          <div style="margin-bottom: 16px; border-bottom:1px solid var(--border); padding-bottom:8px;">GENERATE REPORT</div>
          
          <div style="margin-bottom: 16px;">
            <label style="display:block; margin-bottom:8px; font-family:var(--font-mono); color:var(--text-secondary);">Select Zone ID:</label>
            <select id="zoneSelect" style="width:100%; padding:8px; background:var(--bg-sunken); border:1px solid var(--border); color:var(--text); font-family:var(--font-mono);">
              <!-- Populated dynamically by report.js -->
            </select>
          </div>
          
          <button id="generateBtn" style="width:100%; padding:12px; font-weight:bold; background:var(--border-strong);">RUN GENERATOR (10s)</button>
        </div>

        <!-- Output View -->
        <div class="ascii-box" style="display:flex; flex-direction:column;">
          <div style="margin-bottom: 16px; border-bottom:1px solid var(--border); padding-bottom:8px;">REPORT OUTPUT</div>
          
          <div id="reportOutput" style="flex:1; overflow-y:auto; font-family:var(--font-mono); font-size:13px; color:var(--text-muted); white-space:pre-wrap;">
            Select a zone and click Generate to produce an incident report.
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../static/js/report.js"></script>
</body>
</html>
