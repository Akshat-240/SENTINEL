<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
  <meta charset="UTF-8" />
  <script>
  (function () {
    try {
      var theme = localStorage.getItem('sentinel_theme');
      if (theme === 'day' || theme === 'night') {
        document.documentElement.setAttribute('data-theme', theme);
      }
    } catch (e) { /* localStorage unavailable — falls back to default data-theme="day" already in the HTML */ }
  })();
</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTINEL — Replay</title>
  <link rel="stylesheet" href="../static/css/sentinel.css" />
  <link rel="stylesheet" href="../static/css/replay.css" />
</head>
<body>

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="topbar__logo">
      <span class="topbar__logo-mark"></span>
      SENTINEL
    </div>

    <nav class="topbar__nav">
      <a class="topbar__link" href="index.html">Dashboard</a>
      <a class="topbar__link" href="heatmap.html">Heatmap</a>
      <a class="topbar__link" href="workers.html">Workers</a>
      <a class="topbar__link" href="permits.html">Permits</a>
      <a class="topbar__link is-active" href="replay.html">Replay</a>
      <a class="topbar__link" href="report.html">Report</a>
      <a class="topbar__link" href="copilot.html">AI Assistant</a>
    </nav>

    <div class="topbar__right">
      <button class="theme-toggle">Night mode</button>
      <span class="topbar__clock mono">00:00:00</span>
      <div id="globalReplayBar"></div>
    </div>
  </header>

  <div class="replay-shell">

    <div class="replay-header">
      <div>
        <h1>Incident Replay</h1>
        <span class="replay-subtitle" id="replaySubtitle">Key events · All zones</span>
      </div>
      <button class="replay-play-btn" id="playFullBtn" type="button">▶ Play Full Incident</button>
    </div>

    <div class="replay-controls card">
      <div class="replay-zone-tabs" id="zoneTabs">
        <button class="replay-zone-tab is-active" data-zone="all">All</button>
        <button class="replay-zone-tab" data-zone="A">Zone A</button>
        <button class="replay-zone-tab" data-zone="B">Zone B</button>
        <button class="replay-zone-tab" data-zone="C">Zone C</button>
        <button class="replay-zone-tab" data-zone="D">Zone D</button>
        <button class="replay-zone-tab" data-zone="E">Zone E</button>
        <button class="replay-zone-tab" data-zone="F">Zone F</button>
      </div>
      <input class="replay-search" id="replaySearch" type="text" placeholder="Search timeline…" />
    </div>

    <div class="replay-timeline" id="replayTimeline"></div>

  </div>

  <!-- ============ FLOATING ai_assistant ============ -->
  <div class="ai_assistant-fab">
    <div class="ai_assistant-fab__panel">
      <div class="ai_assistant-fab__header">
        <span class="ai_assistant-fab__title">AI Assistant</span>
        <a class="ai_assistant-fab__expand" href="copilot.html">Expand ↗</a>
      </div>
      <div class="ai_assistant-fab__messages">
        Ask about zone status, permits, or recommended actions.
      </div>
      <div class="ai_assistant-fab__input-row">
        <input class="ai_assistant-fab__input" type="text" placeholder="Ask SENTINEL..." />
      </div>
    </div>
    <button class="ai_assistant-fab__button">SC</button>
  </div>

  <script src="../static/js/data.js"></script>
  <script src="../static/js/common.js"></script>
  <script src="../static/js/replay.js"></script>
</body>
</html>
